services:
    postgres:
        image: postgres:latest
        environment:
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - SB_CLIENT__MEMBERBERRIES__DATABASE={SB_CLIENT__MEMBERBERRIES__DATABASE}
        volumes:
            - postgresql_data:/var/lib/postgresql
            - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
            interval: 1s
            timeout: 5s
            retries: 10
        networks:
            - private
        restart: unless-stopped

    redis:
        image: redis:latest
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
            interval: 1s
            timeout: 5s
            retries: 10
        networks:
            - private
        restart: unless-stopped

    nexus:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_NAME: nexus
        container_name: nexus
        environment:
            - TZ=${TZ}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
            interval: 30s
            timeout: 10s
            retries: 3
        networks:
            - private
            - outbound
        restart: unless-stopped

    memberberries-bot:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_NAME: memberberries-bot
        container_name: memberberries-bot
        environment:
            - TZ=${TZ}
            - SB_CLIENT__GUILDS=${SB_CLIENT__GUILDS}
            - SB_CLIENT__MEMBERBERRIES__TOKEN=${SB_CLIENT__MEMBERBERRIES__TOKEN}
            - SB_CLIENT__MEMBERBERRIES__DATABASE=${SB_CLIENT__MEMBERBERRIES__DATABASE}
            - SB_SERVICES__POSTGRES__URI=${SB_SERVICES__POSTGRES__URI}
            - SB_SERVICES__REDIS__URI=${SB_SERVICES__REDIS__URI}
            - SB_SERVICES__GRAPHQL__URI=${SB_SERVICES__GRAPHQL__URI}
            - SB_SERVICES__IGDB__CLIENT_ID=${SB_SERVICES__IGDB__CLIENT_ID}
            - SB_SERVICES__IGDB__CLIENT_SECRET=${SB_SERVICES__IGDB__CLIENT_SECRET}
            - SB_SERVICES__ITAD__API_KEY=${SB_SERVICES__ITAD__API_KEY}
            - SB_SERVICES__REDDIT__CLIENT_ID=${SB_SERVICES__REDDIT__CLIENT_ID}
            - SB_SERVICES__REDDIT__CLIENT_SECRET=${SB_SERVICES__REDDIT__CLIENT_SECRET}
            - SB_SERVICES__STEAM__API_KEY=${SB_SERVICES__STEAM__API_KEY}
            - SB_SERVICES__TMDB__API_KEY=${SB_SERVICES__TMDB__API_KEY}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            nexus:
                condition: service_healthy
        networks:
            - private
            - outbound
        restart: unless-stopped

    randy-bot:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                APP_NAME: randy-bot
        container_name: randy-bot
        environment:
            - TZ=${TZ}
            - SB_CLIENT__GUILDS=${SB_CLIENT__GUILDS}
            - SB_CLIENT__RANDY__TOKEN=${SB_CLIENT__RANDY__TOKEN}
        networks:
            - private
            - outbound
        restart: unless-stopped

volumes:
    postgresql_data:
    redis_data:

networks:
    private:
        internal: true
    outbound:
